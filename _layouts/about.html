---
layout: default
---

<article class="about-page">
  <header class="about-page__header">
    <p class="eyebrow">About</p>
    <h1>{{ page.title }}</h1>
    {% if page.intro %}
    <p class="about-page__intro">{{ page.intro }}</p>
    {% endif %}
  </header>

  <div class="about-page__content">
    {{ content }}
  </div>
</article>
