---
layout: default
---

<article class="project-page">
  <p class="project-page__back">
    <a href="{{ '/' | relative_url }}#projects">Back to projects</a>
  </p>

  <header class="project-page__header">
    {% if page.technologies %}
    <p class="project-tech-line"><strong>Technologies:</strong> {{ page.technologies }}</p>
    {% endif %}

    {% if page.year %}
    <p class="eyebrow">{{ page.year }}</p>
    {% endif %}

    <h1>{{ page.title }}</h1>

    {% if page.summary %}
    <p class="project-page__summary">{{ page.summary }}</p>
    {% endif %}
  </header>

  <div class="project-page__content">
    {{ content }}
  </div>
</article>
