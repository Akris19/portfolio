<!doctype html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <div class="site-shell">
    <header class="site-header">
      <a class="site-brand" href="{{ '/' | relative_url }}">
        <span class="site-brand__name">{{ site.title }}</span>
        <span class="site-brand__tag">{{ site.description }}</span>
      </a>
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}#projects">Projects</a>
        <a href="{{ '/' | relative_url }}#about">About</a>
        <a href="https://github.com/akris19">GitHub</a>
      </nav>
    </header>

    <main class="site-main">
      {{ content }}
    </main>

    <footer class="site-footer">
      <p>Built with GitHub Pages, Jekyll, and Markdown project files.</p>
    </footer>
  </div>
</body>
</html>
